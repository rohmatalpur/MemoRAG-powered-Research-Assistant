version: "3.9"

services:
  # ── Vector DB ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Redis (Celery broker) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --appendonly yes
    restart: unless-stopped

  # ── Grobid (PDF parser) ───────────────────────────────────
  grobid:
    image: lfoppiano/grobid:0.8.1
    ports:
      - "8070:8070"
    restart: unless-stopped
    environment:
      - GROBID_SERVER_MAXREQUESTSIZE=128000000

  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379/0
      - GROBID_URL=http://grobid:8070
      - SQLITE_URL=sqlite:////app/data/research_assistant.db
      - GRAPH_PATH=/app/data/knowledge_graph.pickle
      - UPLOAD_DIR=/app/data/papers
    volumes:
      - app_data:/app/data
    depends_on:
      - qdrant
      - redis
      - grobid
    restart: unless-stopped

  # ── Celery worker ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379/0
      - GROBID_URL=http://grobid:8070
      - SQLITE_URL=sqlite:////app/data/research_assistant.db
      - GRAPH_PATH=/app/data/knowledge_graph.pickle
      - UPLOAD_DIR=/app/data/papers
    volumes:
      - app_data:/app/data
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  app_data:
  redis_data:
